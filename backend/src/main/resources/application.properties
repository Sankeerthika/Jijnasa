# Database Configuration
spring.datasource.url=${DB_URL:jdbc:h2:mem:jijnasa-db;DB_CLOSE_DELAY=-1}
# Only use these if they are provided, otherwise rely on the URL credentials
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

# Server
server.port=${PORT:8080}
server.address=0.0.0.0

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=true
# Force PostgreSQL dialect if the URL starts with postgres
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# AI Chatbot
gemini.api.key=${GEMINI_KEY}
gemini.api.url=${GEMINI_URL}

# Frontend CORS
frontend.url=${FRONTEND_URL:http://localhost:5173}